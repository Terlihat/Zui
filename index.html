<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrasi Data</title>
    <style>
        /* ================= TEMA DEFAULT (DARK) ================= */
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --error-bg: #7f1d1d;
            --error-text: #fca5a5;
            --error-border: #ef4444;
            --border-color: #374151;
            --mark-bg: #713f12; 
            --input-bg: #374151;
            --input-text: #f9fafb;
            --header-bg: #111827;
            --btn-salin-bg: #4b5563;
        }

        /* ================= TEMA LIGHT ================= */
        [data-theme="light"] {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --error-bg: #fee2e2;
            --error-text: #b91c1c;
            --error-border: #ef4444;
            --border-color: #e5e7eb;
            --mark-bg: #fef08a; 
            --input-bg: #ffffff;
            --input-text: #1f2937;
            --header-bg: #f8fafc;
            --btn-salin-bg: #e5e7eb;
        }

        /* ================= TEMA GREEN LIGHT ================= */
        [data-theme="green-light"] {
            --primary: #059669;
            --primary-hover: #047857;
            --bg-color: #ecfdf5;
            --card-bg: #ffffff;
            --text-main: #064e3b;
            --text-muted: #047857;
            --error-bg: #fee2e2;
            --error-text: #b91c1c;
            --error-border: #ef4444;
            --border-color: #a7f3d0;
            --mark-bg: #fef08a;
            --input-bg: #ffffff;
            --input-text: #064e3b;
            --header-bg: #d1fae5;
            --btn-salin-bg: #a7f3d0;
        }

        /* ================= TEMA BLUE DARK ================= */
        [data-theme="blue-dark"] {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error-bg: #7f1d1d;
            --error-text: #fca5a5;
            --error-border: #ef4444;
            --border-color: #334155;
            --mark-bg: #713f12;
            --input-bg: #334155;
            --input-text: #f8fafc;
            --header-bg: #0f172a;
            --btn-salin-bg: #475569;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 15px;
            padding-bottom: 80px; 
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px; 
            transition: background-color 0.3s;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .input-error {
            background-color: var(--error-bg) !important;
            border-color: var(--error-border) !important;
            color: var(--error-text) !important;
        }

        button.btn-primary {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }

        button.btn-primary:hover {
            background-color: var(--primary-hover);
        }

        button.btn-download {
            width: 100%;
            background-color: #10b981;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .data-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .data-header {
            background-color: var(--header-bg);
            padding: 8px 12px;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .btn-hapus {
            color: #ef4444;
            background: none;
            border: none;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-info {
            display: flex;
            flex-direction: column;
        }

        .data-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .data-value {
            font-family: monospace;
            font-size: 15px;
            font-weight: 600;
        }

        .btn-salin {
            background-color: var(--btn-salin-bg);
            color: var(--text-main);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-salin.disalin {
            background-color: #10b981 !important;
            color: white !important;
        }

        .mark-kk {
            background-color: var(--mark-bg);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 20px;
        }

        .theme-switcher {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: var(--card-bg);
            padding: 8px 12px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }

        .theme-switcher select {
            background-color: transparent;
            color: var(--text-main);
            border: none;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }
        
        .theme-switcher select option {
            background-color: var(--card-bg);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Registrasi Data</h2>
        
        <div class="form-group">
            <label for="nik">NIK</label>
            <input type="text" id="nik" placeholder="Masukkan 16 digit angka" oninput="formatInputPintar(this)">
        </div>

        <div class="form-group">
            <label for="kk">KK (Opsional)</label>
            <input type="text" id="kk" placeholder="Boleh dikosongkan" oninput="formatInputPintar(this)">
        </div>

        <button class="btn-primary" onclick="tambahData()">Tambah Data</button>

        <div class="data-list" id="dataContainer">
            <div class="empty-state">Belum ada data tersimpan</div>
        </div>

        <button class="btn-download" id="btnDownload" style="display: none;" onclick="downloadTXT()">Download Semua (TXT)</button>
    </div>

    <div class="theme-switcher">
        <label for="themeSelect" style="margin:0; font-size: 18px;">🎨</label>
        <select id="themeSelect" onchange="ubahTema(this.value)">
            <option value="dark">Dark (Default)</option>
            <option value="light">Light</option>
            <option value="green-light">Green Light</option>
            <option value="blue-dark">Blue Dark</option>
        </select>
    </div>

    <script>
        let dataPenduduk = [];

        window.onload = function() {
            const temaTersimpan = localStorage.getItem('pilihanTema') || 'dark';
            ubahTema(temaTersimpan);
            document.getElementById('themeSelect').value = temaTersimpan;

            const dataTersimpan = localStorage.getItem('dataRegistrasi');
            if (dataTersimpan) {
                dataPenduduk = JSON.parse(dataTersimpan);
                renderData();
            }
        };

        // Fungsi baru untuk merapikan input otomatis (termasuk saat paste NIK berspasi)
        function formatInputPintar(inputElement) {
            // 1. Hapus semua karakter yang bukan angka (huruf, simbol, spasi)
            let angkaBersih = inputElement.value.replace(/[^0-9]/g, '');
            
            // 2. Potong paksa jika lebih dari 16 digit
            if (angkaBersih.length > 16) {
                angkaBersih = angkaBersih.slice(0, 16);
            }
            
            // 3. Kembalikan nilainya ke kotak input
            inputElement.value = angkaBersih;
        }

        function ubahTema(tema) {
            document.documentElement.setAttribute('data-theme', tema);
            localStorage.setItem('pilihanTema', tema);
        }

        function simpanKeLokal() {
            localStorage.setItem('dataRegistrasi', JSON.stringify(dataPenduduk));
        }

        function tambahData() {
            const inputNik = document.getElementById('nik');
            const inputKk = document.getElementById('kk');
            
            const nik = inputNik.value;
            const kk = inputKk.value;

            inputNik.classList.remove('input-error');

            if (nik.length !== 16) {
                alert("NIK wajib diisi dan harus 16 digit!");
                inputNik.classList.add('input-error');
                return;
            }
            
            if (kk.length > 0 && kk.length !== 16) {
                alert("KK harus 16 digit atau dikosongkan sama sekali!");
                return;
            }

            let isNikDuplicate = dataPenduduk.some(data => data.nik === nik);
            if (isNikDuplicate) {
                alert("Gagal! NIK ini sudah terdaftar.");
                inputNik.classList.add('input-error');
                return;
            }

            dataPenduduk.push({ nik: nik, kk: kk });
            simpanKeLokal();

            inputNik.value = '';
            inputKk.value = '';
            inputNik.focus();

            renderData();
        }

        function hapusData(index) {
            if (confirm("Hapus data ini?")) {
                dataPenduduk.splice(index, 1);
                simpanKeLokal(); 
                renderData();
            }
        }

        function formatAngka(angka) {
            return angka.replace(/(\d{6})(\d{6})(\d{4})/, '$1 $2 $3');
        }

        function salinTeks(teks, btnElement) {
            navigator.clipboard.writeText(teks).then(() => {
                const teksAwal = btnElement.innerText;
                btnElement.innerText = 'Disalin!';
                btnElement.classList.add('disalin');
                
                setTimeout(() => {
                    btnElement.innerText = teksAwal;
                    btnElement.classList.remove('disalin');
                }, 1500);
            });
        }

        function renderData() {
            const container = document.getElementById('dataContainer');
            const btnDownload = document.getElementById('btnDownload');
            container.innerHTML = '';

            if (dataPenduduk.length === 0) {
                container.innerHTML = '<div class="empty-state">Belum ada data tersimpan</div>';
                btnDownload.style.display = 'none';
                return;
            }

            btnDownload.style.display = 'block';

            const hitungKk = {};
            dataPenduduk.forEach(d => {
                if (d.kk) {
                    hitungKk[d.kk] = (hitungKk[d.kk] || 0) + 1;
                }
            });

            dataPenduduk.forEach((data, index) => {
                const isKkSama = data.kk && hitungKk[data.kk] > 1;
                const kelasMarkKk = isKkSama ? 'mark-kk' : '';

                const card = document.createElement('div');
                card.className = 'data-card';
                
                card.innerHTML = `
                    <div class="data-header">
                        <span>No. ${index + 1}</span>
                        <button class="btn-hapus" onclick="hapusData(${index})">Hapus</button>
                    </div>
                    <div class="data-row">
                        <div class="data-info">
                            <span class="data-label">NIK</span>
                            <span class="data-value">${formatAngka(data.nik)}</span>
                        </div>
                        <button class="btn-salin" onclick="salinTeks('${data.nik}', this)">Salin</button>
                    </div>
                    <div class="data-row ${kelasMarkKk}">
                        <div class="data-info">
                            <span class="data-label">KK</span>
                            <span class="data-value">${data.kk ? formatAngka(data.kk) : '-'}</span>
                        </div>
                        ${data.kk ? `<button class="btn-salin" onclick="salinTeks('${data.kk}', this)">Salin</button>` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function downloadTXT() {
            if (dataPenduduk.length === 0) return;

            let isiTeks = "=== DATA REGISTRASI ===\n\n";
            dataPenduduk.forEach((data, index) => {
                isiTeks += `Data Ke-${index + 1}\n`;
                isiTeks += `NIK : ${data.nik}\n`;
                isiTeks += `KK  : ${data.kk ? data.kk : '-'}\n`;
                isiTeks += `------------------------\n`;
            });

            const blob = new Blob([isiTeks], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            
            a.href = url;
            a.download = "Data_Registrasi.txt";
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
